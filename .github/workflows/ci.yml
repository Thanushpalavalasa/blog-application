name: Spring Boot CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: Build Spring Boot app with Maven
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Step 4: Build Docker image locally
      - name: Build Docker Image
        run: docker build -t blog-app .

      # Step 5: Login to Docker Hub (safe method)
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin

      # Step 6: Tag Docker image with your username/repo
      - name: Tag Image
        run: docker tag blog-app ${{ secrets.DOCKER_USER }}/blog-app:latest

      # Step 7: Push Docker image to Docker Hub
      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USER }}/blog-app:latest
